<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kangaroo2 组件文档 - Grasshopper 物理引擎</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- 顶部栏 -->
        <header class="top-bar">
            <div class="logo-area">
                <h1>🦘 Kangaroo2</h1>
                <span class="subtitle">组件参考手册</span>
            </div>
            <div class="header-actions">
                <button id="langBtn" class="lang-switch">EN</button>
            </div>
        </header>

        <!-- 分类卡片容器（网格布局，自动换行）-->
        <div class="categories-container">
            <div id="categoriesGrid" class="categories-grid">
                <!-- 动态生成11个分类卡片 -->
            </div>
        </div>

        <!-- 组件详情区域（占比最大）-->
        <div class="detail-panel">
            <div class="detail-header">
                <span>📖 组件详情</span>
                <button id="expandDetailBtn" class="expand-btn" title="展开/收起">⛶</button>
            </div>
            <div id="detailContent" class="detail-content">
                <div class="placeholder">
                    <span>✨ 点击任意组件</span>
                    <span>查看详细说明与示意图</span>
                </div>
            </div>
        </div>

        <!-- 底部栏 -->
        <footer class="footer">
            <span>🐨 Kangaroo2 组件文档 | 版本 2.0</span>
            <div class="footer-links">
                <a href="#" onclick="return false;">📖 使用帮助</a>
                <a href="#" onclick="return false;">🐛 报告问题</a>
                <a href="#" onclick="return false;">📧 联系我们</a>
            </div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
