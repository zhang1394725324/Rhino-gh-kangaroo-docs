<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kangaroo2 组件文档 - Grasshopper 物理引擎</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="top-bar">
            <div class="logo-area">
                <h1>🐨 Kangaroo2</h1>
                <span class="subtitle">组件参考手册</span>
            </div>
            <div class="header-actions">
                <button id="langBtn" class="lang-switch">EN</button>
                <button id="refreshBtn" class="refresh-btn" title="刷新数据">🔄</button>
            </div>
        </header>

        <div class="main-layout" id="mainLayout">
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <span>📂 组件分类</span>
                </div>
                <ul id="groupNavList" class="group-nav"></ul>
            </aside>

            <div class="resizer" id="sidebarResizer"></div>

            <main class="icon-grid-area" id="iconGridArea">
                <div id="currentGroupTitle" class="group-title-header"></div>
                <div id="iconsContainer" class="icons-grid"></div>
            </main>

            <div class="resizer" id="detailResizer"></div>

            <aside class="detail-panel" id="detailPanel">
                <div class="detail-header">
                    <span>📖 组件详情</span>
                    <button id="expandDetailBtn" class="expand-btn" title="展开/收起">⛶</button>
                </div>
                <div id="detailContent" class="detail-content">
                    <div class="placeholder">
                        <span>✨ 点击任意组件</span>
                        <span>查看详细说明与示意图</span>
                    </div>
                </div>
            </aside>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
