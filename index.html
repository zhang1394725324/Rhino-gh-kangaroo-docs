<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kangaroo2 组件文档 - Grasshopper 物理引擎</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- 顶部导航栏 -->
        <header class="top-bar">
            <div class="logo-area">
                <h1>🦘 Kangaroo2</h1>
                <span class="subtitle">组件参考手册</span>
            </div>
            <button id="langBtn" class="lang-switch">EN</button>
        </header>

        <!-- 主体：三栏布局 -->
        <div class="main-layout" id="mainLayout">
            <!-- 左侧分组导航 -->
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <span>📂 组件分类</span>
                </div>
                <ul id="groupNavList" class="group-nav">
                    <!-- 动态渲染 -->
                </ul>
            </aside>

            <!-- 可拖动分隔条 -->
            <div class="resizer" id="sidebarResizer"></div>

            <!-- 中间图标网格 -->
            <main class="icon-grid-area" id="iconGridArea">
                <div id="currentGroupTitle" class="group-title-header"></div>
                <div id="iconsContainer" class="icons-grid">
                    <!-- 动态渲染图标 -->
                </div>
            </main>

            <!-- 可拖动分隔条 -->
            <div class="resizer" id="detailResizer"></div>

            <!-- 右侧详情面板 -->
            <aside class="detail-panel" id="detailPanel">
                <div class="detail-header">
                    <span>📖 组件详情</span>
                </div>
                <div id="detailContent" class="detail-content">
                    <div class="placeholder">
                        <span>✨ 点击任意组件</span>
                        <span>查看详细说明与示意图</span>
                    </div>
                </div>
            </aside>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
