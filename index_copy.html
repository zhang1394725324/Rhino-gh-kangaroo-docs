<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kangaroo2 组件文档 - Grasshopper 物理引擎</title>
    <link rel="stylesheet" href="style_copy.css">
</head>
<body>
    <div class="app-container">
        <!-- 第一行：顶部栏 -->
        <header class="top-bar">
            <div class="logo-area">
                <h1>🐨 Kangaroo2</h1>
                <span class="subtitle">组件参考手册</span>
            </div>
            <div class="header-actions">
                <button id="langBtn" class="lang-switch">EN</button>
                <button id="refreshBtn" class="refresh-btn" title="刷新数据">🔄</button>
                <button id="clearCacheBtn" class="clear-cache-btn" title="清除缓存">🗑️</button>
            </div>
        </header>

        <!-- 第二行：组件分类导航（横向滚动）-->
        <div class="category-nav">
            <ul id="groupNavList" class="group-nav-horizontal"></ul>
        </div>

        <!-- 第三行：图标网格区域 -->
        <div class="icon-grid-area">
            <div id="currentGroupTitle" class="group-title-header"></div>
            <div id="iconsContainer" class="icons-grid"></div>
        </div>

        <!-- 第四行：组件详情区域（占比最大）-->
        <div class="detail-panel">
            <div class="detail-header">
                <span>📖 组件详情</span>
                <button id="expandDetailBtn" class="expand-btn" title="展开/收起">⛶</button>
            </div>
            <div id="detailContent" class="detail-content">
                <div class="placeholder">
                    <span>✨ 点击任意组件</span>
                    <span>查看详细说明与示意图</span>
                </div>
            </div>
        </div>

        <!-- 第五行：底部栏 -->
        <footer class="footer">
            <span>🐨 Kangaroo2 组件文档 | 版本 2.0</span>
            <div class="footer-links">
                <a href="#" onclick="return false;">📖 使用帮助</a>
                <a href="#" onclick="return false;">🐛 报告问题</a>
                <a href="#" onclick="return false;">📧 联系我们</a>
            </div>
        </footer>
    </div>
    <script src="script_copy.js"></script>
</body>
</html>
